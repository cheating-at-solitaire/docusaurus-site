apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docusaurus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cheating-at-solitaire/docusaurus-site
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
